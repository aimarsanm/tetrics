repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.3
  hooks:
    - id: ruff-check
      args: [--fix, --exit-non-zero-on-fix]
    - id: ruff-format

- repo: https://github.com/psf/black
  rev: 24.4.2
  hooks:
    - id: black


-   repo: local
    hooks:
    -   id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        args: [--pythonversion, '3.12']
    -   id: pytest-api
        name: pytest-api
        entry: bash -c "cd lks-idprovider-api && poetry run pytest"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
    -   id: pytest-keycloak
        name: pytest-keycloak
        entry: bash -c "cd lks-idprovider-keycloak && poetry run pytest"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
    -   id: pytest-fastapi
        name: pytest-fastapi
        entry: bash -c "cd lks-idprovider-fastapi && poetry run pytest"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
