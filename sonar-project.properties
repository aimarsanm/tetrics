# SonarQube Project Configuration
sonar.projectKey=tetrics
sonar.projectName=Tetrics
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.tests=

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/node_modules/**,**/.venv/**,**/venv/**,**/*.pyc,**/alembic/**,**/dist/**,**/.next/**,**/.nuxt/**,**/coverage/**

# Coverage (optional - configure if you have test coverage)
# sonar.python.coverage.reportPaths=coverage.xml

# Server connection (for local development)
sonar.host.url=http://localhost:9000
